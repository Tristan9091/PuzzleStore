<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuzzleStore — Acceso</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-brand">🧩 PuzzleStore</h1>
            <p class="text-muted">Cubos, rompecabezas y más</p>
          </div>

          <div class="card shadow-sm">
            <div class="card-body p-4">
              <!-- Pestañas: Iniciar sesión / Registrarse -->
              <ul class="nav nav-tabs nav-fill mb-4" role="tablist">
                <li class="nav-item">
                  <button
                    class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#panel-login"
                    type="button"
                  >
                    Iniciar sesión
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#panel-registro"
                    type="button"
                  >
                    Registrarse
                  </button>
                </li>
              </ul>

              <!-- Zona de mensajes (errores / éxitos) -->
              <div id="mensaje" class="alert d-none" role="alert"></div>

              <div class="tab-content">
                <!-- PANEL LOGIN -->
                <div class="tab-pane fade show active" id="panel-login">
                  <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input
                      type="email"
                      id="login-email"
                      class="form-control"
                      placeholder="tu@correo.com"
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="login-password"
                      class="form-control"
                      placeholder="••••••••"
                    />
                  </div>
                  <button id="btn-login" class="btn btn-brand w-100">
                    Entrar
                  </button>
                </div>

                <!-- PANEL REGISTRO -->
                <div class="tab-pane fade" id="panel-registro">
                  <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input
                      type="text"
                      id="reg-nombre"
                      class="form-control"
                      placeholder="Tu nombre"
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input
                      type="email"
                      id="reg-email"
                      class="form-control"
                      placeholder="tu@correo.com"
                    />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input
                      type="password"
                      id="reg-password"
                      class="form-control"
                      placeholder="Mínimo 6 caracteres"
                    />
                  </div>
                  <button id="btn-registro" class="btn btn-brand w-100">
                    Crear cuenta
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
