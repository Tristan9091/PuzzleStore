<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuzzleStore — Checkout</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-brand sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🧩 PuzzleStore</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          <span
            class="navbar-text text-white-50 small"
            id="usuario-email"
          ></span>
          <a href="index.html" class="btn btn-light">← Seguir comprando</a>
          <button class="btn btn-outline-light" id="btn-salir">Salir</button>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row g-4">
        <!-- COLUMNA IZQUIERDA: resumen del carrito + formulario de compra -->
        <div class="col-lg-7">
          <h2 class="h4 mb-3">Resumen de tu compra</h2>
          <div class="card mb-4">
            <div class="card-body">
              <div id="resumen-items"></div>
              <hr />
              <div class="d-flex justify-content-between fs-5">
                <strong>Total:</strong>
                <strong id="resumen-total" class="text-brand">$0.00</strong>
              </div>
            </div>
          </div>

          <h2 class="h4 mb-3">Datos de envío</h2>
          <div class="card">
            <div class="card-body">
              <div id="checkout-mensaje" class="alert d-none"></div>
              <div class="mb-3">
                <label class="form-label">Nombre completo</label>
                <input type="text" id="form-nombre" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label">Dirección de envío</label>
                <input
                  type="text"
                  id="form-direccion"
                  class="form-control"
                  placeholder="Calle, número, colonia, ciudad"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Método de pago</label>
                <select id="form-pago" class="form-select">
                  <option value="tarjeta">Tarjeta de crédito/débito</option>
                  <option value="paypal">PayPal</option>
                  <option value="transferencia">Transferencia</option>
                </select>
              </div>
              <button id="btn-pagar" class="btn btn-brand btn-lg w-100">
                Confirmar compra
              </button>
            </div>
          </div>
        </div>

        <!-- COLUMNA DERECHA: historial de órdenes -->
        <div class="col-lg-5">
          <h2 class="h4 mb-3">Mis pedidos</h2>
          <div id="historial">
            <p class="text-muted">Cargando...</p>
          </div>
        </div>
      </div>

      <!-- SECCIÓN DE CHAT (misma que en index, se activa en la Fase 6) -->
      <hr class="my-5" />
      <section id="chat-seccion">
        <h2 class="h4 mb-3">💬 Atención en línea</h2>
        <div class="card">
          <div id="chat-mensajes" class="card-body chat-mensajes"></div>
          <div class="card-footer d-flex gap-2">
            <input
              type="text"
              id="chat-input"
              class="form-control"
              placeholder="Escribe tu mensaje..."
            />
            <button id="chat-enviar" class="btn btn-brand">Enviar</button>
          </div>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
