<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuzzleStore — Catálogo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <!-- BARRA SUPERIOR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-brand sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🧩 PuzzleStore</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
          <span
            class="navbar-text text-white-50 small"
            id="usuario-email"
          ></span>
          <!-- Botón del carrito con contador -->
          <button
            class="btn btn-light position-relative"
            data-bs-toggle="offcanvas"
            data-bs-target="#carrito"
          >
            🛒 Carrito
            <span
              id="carrito-badge"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none"
              >0</span
            >
          </button>
          <button class="btn btn-outline-light" id="btn-salir">Salir</button>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <!-- BUSCADOR -->
      <div class="row mb-4">
        <div class="col-md-6 mx-auto">
          <input
            type="text"
            id="buscador"
            class="form-control form-control-lg"
            placeholder="🔍 Buscar productos..."
          />
        </div>
      </div>

      <!-- CATÁLOGO -->
      <h2 class="h4 mb-3">Catálogo</h2>
      <div id="catalogo" class="row g-4">
        <!-- las tarjetas se inyectan desde index.js -->
      </div>
      <p id="catalogo-vacio" class="text-muted text-center py-5 d-none">
        No se encontraron productos.
      </p>

      <!-- SECCIÓN DE CHAT (se activa en la Fase 6) -->
      <hr class="my-5" />
      <section id="chat-seccion">
        <h2 class="h4 mb-3">💬 Atención en línea</h2>
        <div class="card">
          <div id="chat-mensajes" class="card-body chat-mensajes"></div>
          <div class="card-footer d-flex gap-2">
            <input
              type="text"
              id="chat-input"
              class="form-control"
              placeholder="Escribe tu mensaje..."
            />
            <button id="chat-enviar" class="btn btn-brand">Enviar</button>
          </div>
        </div>
      </section>
    </div>

    <!-- PANEL LATERAL DEL CARRITO (offcanvas de Bootstrap) -->
    <div class="offcanvas offcanvas-end" id="carrito">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">🛒 Tu carrito</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column">
        <div id="carrito-items" class="flex-grow-1"></div>
        <div class="border-top pt-3">
          <div class="d-flex justify-content-between mb-3">
            <strong>Total:</strong>
            <strong id="carrito-total">$0.00</strong>
          </div>
          <a
            href="checkout.html"
            class="btn btn-brand w-100"
            id="btn-ir-checkout"
            >Ir a pagar</a
          >
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
